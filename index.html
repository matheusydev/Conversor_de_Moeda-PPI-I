<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Preço - Binance</title>
  <link rel="stylesheet" href="conversao-criptomoedas.css">
  <script defer src="conversao-criptomoedas.js"></script>
</head>

<body>
  <div class="container">
    <h1>Consultar Preço de Moedas</h1>

    <label for="moedaBase">Moeda Base (Ex.: BTC):</label>
    <input type="text" id="moedaBase" list="moedasBase" placeholder="Digite a moeda base">

    <label for="moedaConversao">Moeda Conversão (Ex.: USDT):</label>
    <input type="text" id="moedaConversao" list="moedasConversao" placeholder="Digite a moeda de conversão">

    <datalist id="moedasBase">
      <option value="BTC">
      <option value="ETH">
      <option value="SOL">
      <option value="XRP">
      <option value="DOGE">
    </datalist>

    <datalist id="moedasConversao">
      <option value="USDT">
      <option value="BRL">
    </datalist>

    <div class="botoes">
      <button id="botaoConsultar">Consultar</button>
      <button id="botaoInverter" type="button">Inverter moedas</button>
      <button id="botaoLimpar" type="button">Limpar campos</button>
    </div>

    <div id="resultado"></div>
  </div>

</body>

</html>
